name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: portwatch-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: portwatch-macos-aarch64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: portwatch-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: portwatch-linux-aarch64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz portwatch
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            portwatch-macos-x86_64.tar.gz
            portwatch-macos-aarch64.tar.gz
            portwatch-linux-x86_64.tar.gz
            portwatch-linux-aarch64.tar.gz

      - name: Update Homebrew formula
        run: |
          SHA_MACOS_ARM=$(shasum -a 256 portwatch-macos-aarch64.tar.gz | cut -d' ' -f1)
          SHA_MACOS_X86=$(shasum -a 256 portwatch-macos-x86_64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_ARM=$(shasum -a 256 portwatch-linux-aarch64.tar.gz | cut -d' ' -f1)
          SHA_LINUX_X86=$(shasum -a 256 portwatch-linux-x86_64.tar.gz | cut -d' ' -f1)
          VERSION=${GITHUB_REF_NAME#v}

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/portwatch.rb

          # Update SHA256 hashes in order: arm mac, x86 mac, arm linux, x86 linux
          python3 -c "
          import re
          with open('Formula/portwatch.rb') as f:
              content = f.read()
          placeholders = re.findall(r'sha256 \"[^\"]+\"', content)
          replacements = [
              'sha256 \"${SHA_MACOS_ARM}\"',
              'sha256 \"${SHA_MACOS_X86}\"',
              'sha256 \"${SHA_LINUX_ARM}\"',
              'sha256 \"${SHA_LINUX_X86}\"',
          ]
          for old, new in zip(placeholders, replacements):
              content = content.replace(old, new, 1)
          with open('Formula/portwatch.rb', 'w') as f:
              f.write(content)
          "

          # Expand shell variables in the file
          envsubst < Formula/portwatch.rb > Formula/portwatch.rb.tmp
          mv Formula/portwatch.rb.tmp Formula/portwatch.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master
          git add Formula/portwatch.rb
          git commit -m "chore: update Homebrew formula for v${VERSION}" || true
          git push origin master
